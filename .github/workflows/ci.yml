name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "ruff>=0.4"
      - run: ruff check .

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,cdp,bidi]"
      - run: pip install types-PyYAML
      - run: mypy browsix/

  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev,cdp,bidi,serve]"
      - run: pytest tests/unit/ -m unit -v --cov=browsix --cov-report=xml
      - uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage
          path: coverage.xml

  serve-tests:
    name: Serve mode tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[cdp,serve,dev]"
      - uses: browser-actions/setup-chrome@v1
      - run: pytest tests/unit/test_serve.py -v
      - run: pytest tests/integration/test_serve.py -v -m integration --timeout=60
        continue-on-error: true
        env:
          CHROME_PATH: /opt/chrome/chrome

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - run: pip install -e ".[dev,cdp]"
      - run: pytest tests/integration/ -m integration -v --timeout=60
        continue-on-error: true
        env:
          CHROME_PATH: /opt/chrome/chrome

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: browsix:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true
