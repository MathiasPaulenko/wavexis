[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "browsix"
version = "1.6.0"
description = "Browser automation CLI — wraps cdpwave and bidiwave, no Node.js, no Chromium download"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [{ name = "Mathias Paulenko", email = "mathias.paulenko@outlook.com" }]
keywords = ["cli", "browser", "automation", "cdp", "bidi", "screenshot", "scraping", "chromium"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Internet :: WWW/HTTP :: Browsers",
    "Topic :: Software Development :: Testing",
]
dependencies = [
    "typer>=0.12",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
cdp = ["cdpwave>=2.0.1"]
bidi = ["bidiwave>=1.7.2"]
rich = ["rich>=13.0"]
serve = ["aiohttp>=3.9"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-aiohttp>=1.0",
    "pytest-cov>=4.0",
    "ruff>=0.4",
    "mypy>=1.10",
    "build>=1.2",
]
docs = [
    "mkdocs>=1.6",
    "mkdocs-material>=9.5",
    "mkdocstrings[python]>=0.24",
]

[project.scripts]
browsix = "browsix.cli:main"

[project.urls]
Homepage = "https://github.com/MathiasPaulenko/browsix"
Repository = "https://github.com/MathiasPaulenko/browsix"
Issues = "https://github.com/MathiasPaulenko/browsix/issues"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM", "ASYNC"]
ignore = ["ASYNC109"]

[tool.mypy]
strict = true
python_version = "3.11"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "unit: fast isolated tests with mocks",
    "integration: tests against a real Chrome browser",
    "slow: tests that take more than 5 seconds",
    "chrome: tests that require Chrome specifically",
]

[tool.hatch.build.targets.wheel]
packages = ["browsix"]
